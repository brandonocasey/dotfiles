[tools]
node = "26"
go = ['latest']
uv = ['latest']

[settings]
experimental = true
# Use the system python instead of a mise-managed one (replaces the deprecated
# `python = ['system']` pseudo-version).
disable_tools = ['python']
trusted_config_paths = [
    '~/Projects/',
    '~/.local/share/vibetree/worktrees/',
    '~/projects'
]
idiomatic_version_file_enable_tools = ["node"]

[_]
file = { path = ".vt.env.local", required = false }
